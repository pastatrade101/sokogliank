services:
  web:
    container_name: sokogliank-web
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REACT_APP_PREMIUM_CHECKOUT_URL: ${REACT_APP_PREMIUM_CHECKOUT_URL:-}
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
